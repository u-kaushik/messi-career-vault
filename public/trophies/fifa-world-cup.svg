<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">FIFA World Cup trophy</title>
  <desc id="desc">A detailed vector study of Silvio Gazzaniga’s post-1974 trophy, with two rising figures supporting a globe above a malachite-banded base.</desc>
  <defs>
    <linearGradient id="gold" x1=".08" y1=".08" x2=".9" y2=".94">
      <stop offset="0" stop-color="#fff3a4"/>
      <stop offset=".12" stop-color="#e7bd3d"/>
      <stop offset=".32" stop-color="#9e6710"/>
      <stop offset=".5" stop-color="#f5d75f"/>
      <stop offset=".7" stop-color="#b37712"/>
      <stop offset=".86" stop-color="#ffe879"/>
      <stop offset="1" stop-color="#81500a"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0" x2="1">
      <stop stop-color="#694006"/>
      <stop offset=".42" stop-color="#c58b1e"/>
      <stop offset=".72" stop-color="#7b4b08"/>
      <stop offset="1" stop-color="#e2b43a"/>
    </linearGradient>
    <linearGradient id="malachite" x1="0" x2="1">
      <stop stop-color="#0a351f"/>
      <stop offset=".2" stop-color="#28845a"/>
      <stop offset=".48" stop-color="#0e4f34"/>
      <stop offset=".7" stop-color="#43a06e"/>
      <stop offset="1" stop-color="#092c1b"/>
    </linearGradient>
    <radialGradient id="globe" cx="37%" cy="25%" r="75%">
      <stop stop-color="#fff8b4"/>
      <stop offset=".25" stop-color="#e5b934"/>
      <stop offset=".62" stop-color="#a2670c"/>
      <stop offset="1" stop-color="#704306"/>
    </radialGradient>
    <clipPath id="earth"><circle cx="256" cy="103" r="76"/></clipPath>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#02060c" flood-opacity=".32"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Globe: slightly flattened by perspective, as on the original sculpture. -->
    <circle cx="256" cy="103" r="76" fill="url(#globe)" stroke="#6f4508" stroke-width="4"/>
    <g clip-path="url(#earth)" fill="#754708" opacity=".72">
      <path d="M211 36l17 5 10 13 20 4 7 12-9 12-18 2-7 12-13 3-4 20-12 13-16-6-7-20 5-16-11-13 8-18 14-4z"/>
      <path d="M276 34l28 8 9 11 22 8 9 18-10 7-2 15-13 4-8 20-12 6-5-15-17-10-9-17 7-14-8-17z"/>
      <path d="M248 121l17-6 19 10 8 20-8 22-13 17-14-9-3-20-12-9z"/>
      <path d="M316 132l18 3 9 12-8 15-20 7-8-13z"/>
    </g>
    <path d="M202 74c29-20 70-29 106-10" fill="none" stroke="#fff5a0" stroke-width="7" stroke-linecap="round" opacity=".42"/>
    <path d="M196 116c30 34 86 50 125 17" fill="none" stroke="#5f3905" stroke-width="5" opacity=".3"/>

    <!-- The two athletes fuse into one narrow, upward-turning sculptural spiral. -->
    <path fill="url(#gold)" stroke="#724606" stroke-width="4" stroke-linejoin="round"
      d="M205 381c-10-31-14-58-10-83 5-35 20-66 43-95l18-21 18 21c23 29 38 60 43 95 4 25 0 52-10 83l-51 15z"/>
    <path fill="url(#goldDark)" stroke="#724606" stroke-width="4" stroke-linejoin="round"
      d="M244 190c-14 37-15 70-3 99 8 19 22 36 43 53 12 10 20 24 23 41l-39 11c-4-17-13-31-27-43-25-21-40-45-45-72-5-32 5-65 30-99z"/>
    <path fill="url(#gold)" stroke="#724606" stroke-width="4" stroke-linejoin="round"
      d="M268 190c14 37 15 70 3 99-8 19-22 36-43 53-12 10-20 24-23 41l39 11c4-17 13-31 27-43 25-21 40-45 45-72 5-32-5-65-30-99z"/>
    <path d="M226 211c-11 35-8 64 9 88 11 16 25 29 43 42" fill="none" stroke="#ffe875" stroke-width="10" stroke-linecap="round" opacity=".58"/>
    <path d="M286 211c11 35 8 64-9 88-11 16-25 29-43 42" fill="none" stroke="#754607" stroke-width="11" stroke-linecap="round" opacity=".55"/>

    <!-- Heads and four raised arms blend into the underside of the globe. -->
    <ellipse cx="223" cy="181" rx="14" ry="18" fill="url(#gold)" stroke="#704306" stroke-width="4" transform="rotate(-16 223 181)"/>
    <ellipse cx="289" cy="181" rx="14" ry="18" fill="url(#gold)" stroke="#704306" stroke-width="4" transform="rotate(16 289 181)"/>
    <path d="M215 195c-17-13-27-28-31-46-2-12 0-23 5-34M234 190c7-16 12-31 14-47M297 195c17-13 27-28 31-46 2-12 0-23-5-34M278 190c-7-16-12-31-14-47" fill="none" stroke="url(#gold)" stroke-width="16" stroke-linecap="round"/>
    <path d="M189 115c10 7 18 15 24 25M323 115c-10 7-18 15-24 25" fill="none" stroke="#fff19a" stroke-width="4" stroke-linecap="round" opacity=".52"/>

    <!-- Tapered pedestal and two green malachite rings. -->
    <path d="M181 382h150l14 34-13 54H180l-13-54z" fill="url(#goldDark)" stroke="#654006" stroke-width="4"/>
    <ellipse cx="256" cy="384" rx="76" ry="13" fill="#e5bd42" stroke="#6e4407" stroke-width="4"/>
    <path d="M174 408h164l6 21H168z" fill="url(#malachite)" stroke="#082d1c" stroke-width="3"/>
    <path d="M172 441h168l-8 21H180z" fill="url(#malachite)" stroke="#082d1c" stroke-width="3"/>
    <ellipse cx="256" cy="470" rx="77" ry="13" fill="#7d4c08" stroke="#543304" stroke-width="4"/>
    <ellipse cx="256" cy="466" rx="71" ry="9" fill="#d5a42e" opacity=".78"/>
    <path d="M191 397c31 7 99 7 130 0" fill="none" stroke="#ffeb80" stroke-width="5" opacity=".55"/>
  </g>
</svg>
